<section class="hero">

  <div class="hero-bg">
    <img src="../../../../../assets/img/Adobe Express - file (1).jpg"
         alt="" class="hero-photo" />
    <div class="hero-overlay"></div>
  </div>

  <div class="hero-content">

    <div class="hero-badge">✦ COMPETENCIA OFICIAL 2026 ✦</div>

    <img src="../../../../../assets/img/LOGO 4.png"
         alt="Cookie Fest" class="hero-logo-main"
         onerror="this.style.display='none'" />

    <div class="hero-year-row">
      <span class="year-line"></span>
      <span class="hero-year">2026</span>
      <span class="year-line"></span>
    </div>

    <p class="hero-tagline">LA BATALLA DE LAS GALLETAS</p>
    <p class="hero-sub">VOTA POR TU FAVORITA Y CORONA AL CAMPEÓN DEL AÑO</p>

    <div class="hero-bottom-row">
      <div class="hero-bottom-logos">
        <div class="logo-circle-sm">
          <img src="../../../../../assets/img/logo.png" alt="CF" />
        </div>
        <span class="bottom-x">×</span>
        <div class="logo-circle-sm">
          <img src="../../../../../assets/img/logoFooter.PNG" alt="Vynder" />
        </div>
      </div>

      <div class="hero-register-arc">
        <svg viewBox="0 0 260 200" width="200" height="200">
          <defs>
            <path id="arc" d="M 25,225 A 155,155 0 0,1 225,25"/>
          </defs>
          <text font-size="13" fill="white"
                font-family="'Fredoka', cursive"
                font-weight="600" letter-spacing="2">
            <textPath href="#arc" startOffset="0%">
              REGÍSTRATE PARA DEJAR TU VOTO 
            </textPath>
          </text>
        </svg>
      </div>
    </div>

  </div>

  <!-- Wave decorativo — solo visual, sin pill dentro -->
  <div class="hero-wave-bg">
    <svg viewBox="0 0 390 160" preserveAspectRatio="none"
         xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#8ecfe0; stop-opacity:1" />
          <stop offset="45%" style="stop-color:#b0a0d5; stop-opacity:1" />
          <stop offset="100%" style="stop-color:#f0b8d0; stop-opacity:1" />
        </linearGradient>
      </defs>
      <path d="M0,10 C80,100 200,0 300,55 C340,80 370,35 390,50 L390,160 L0,160 Z"
            fill="url(#waveGrad)"/>
    </svg>
  </div>

  <!-- Pill COMPLETAMENTE SEPARADA del wave, flota sobre todo -->
  <div class="hero-competitors-pill">
    <h2 class="pill-title">COMPETIDORES</h2>
    <p class="pill-sub">Vota por tu galleta favorita y ayuda a definir al campeón</p>
  </div>

</section>
